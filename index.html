<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESAT | DEVAM</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Arka Plan Görseli (Massaka) */
        #background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('arkaplan.jpg') no-repeat center center;
            background-size: cover;
            filter: brightness(0.35) contrast(1.2); /* Yağmurun öne çıkması için ideal karartma */
            z-index: -2;
        }

        /* Yağmur Katmanı */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* Orta Yazı */
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            pointer-events: none;
            user-select: none;
        }

        h1 {
            font-size: 5rem;
            letter-spacing: 20px;
            margin: 0;
            opacity: 0.7;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }

        p {
            letter-spacing: 8px;
            opacity: 0.4;
            font-size: 1.2rem;
        }
    </style>
</head>
<body onclick="startEffect()">

    <div id="background"></div>
    <canvas id="rainCanvas"></canvas>

    <div class="content">
        <h1>DEVAM</h1>
        <p>ROGUE 1453</p>
    </div>

    <audio id="audio" loop>
        <source src="muzik.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('rainCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let drops = [];
        const numberOfDrops = 450; // Yağmurun sıklığı

        class Drop {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * -canvas.height;
                // Gerçekçi hız varyasyonları
                this.speed = Math.random() * 20 + 15; 
                this.length = Math.random() * 25 + 10;
                this.opacity = Math.random() * 0.25 + 0.05;
            }

            draw() {
                ctx.beginPath();
                ctx.strokeStyle = rgba(255, 255, 255, ${this.opacity});
                ctx.lineWidth = 1;
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x, this.y + this.length);
                ctx.stroke();
            }

            update() {
                this.y += this.speed;
                if (this.y > canvas.height) {
                    this.reset();
                }
                this.draw();
            }
        }

        function initRain() {
            drops = [];
            for (let i = 0; i < numberOfDrops; i++) {
                drops.push(new Drop());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drops.forEach(drop => drop.update());
            requestAnimationFrame(animate);
        }

        // Müzik çalma fonksiyonu
        function startEffect() {
            document.getElementById('audio').play();
        }

        // Pencere boyutu değişince yağmuru uyarla
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initRain();
        });

        initRain();
        animate();
    </script>
</body>
</html>
